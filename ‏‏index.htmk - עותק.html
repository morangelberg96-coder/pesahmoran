<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>המירוץ לפסח - חדר בריחה</title>

<meta property="og:title" content="המירוץ לפסח - חדר בריחה">
<meta property="og:description" content="חדר בריחה אקסטרים לליל הסדר! חידות, צפנים ומשימות מטורפות">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;overflow-x:hidden}
.ff{font-family:'Varela Round',sans-serif}
.bg-main{
  background-image:linear-gradient(to bottom,rgba(255,251,235,0.6),rgba(245,208,140,0.5)),url('https://images.unsplash.com/photo-1539768942893-daf53e736b68?q=80&w=2071&auto=format&fit=crop');
  background-size:cover;background-position:center;background-attachment:fixed;
}
.card{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border:2px solid rgba(217,160,60,0.5);box-shadow:0 10px 40px rgba(0,0,0,0.1)}
.btn-gold{background:linear-gradient(to left,#d97706,#f59e0b);color:#fff;transition:all .2s}
.btn-gold:hover{background:linear-gradient(to left,#f59e0b,#fbbf24)}
.btn-gold:active{transform:scale(0.97)}
.btn-gold:disabled{background:linear-gradient(to left,#d1d5db,#d1d5db);cursor:not-allowed}
.btn-dark{background:#92400e;color:#fef3c7;transition:all .2s}
.btn-dark:hover{background:#78350f}
.btn-dark:active{transform:scale(0.97)}
.input-field{background:#fffbeb;border:2px solid #fcd34d;border-radius:1rem;padding:1.2rem 1.4rem;font-size:1.2rem;outline:none;width:100%;color:#78350f;transition:all .2s}
.input-field:focus{border-color:#d97706;box-shadow:0 0 0 4px rgba(251,191,36,0.25)}
.input-field::placeholder{color:rgba(180,130,50,0.4)}
.emoji-float{position:fixed;pointer-events:none;z-index:0;opacity:0.18;animation:floaty 4s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.progress-dot{height:10px;border-radius:99px;transition:all .5s}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="bg-main min-h-screen">

<div id="app"></div>

<script>
const TASKS=[
{id:1,title:"חידת הצופן",description:"כדי לפתוח את המשחק, עליכם לפצח את צופן האותיות הבא:\n\n1. קחו את האות האחרונה של המכה הראשונה.\n2. קחו את האות השנייה של המכה השנייה.\n3. קחו את האות האחרונה של המכה העשירית והאחרונה (קחו מהמילה השנייה: מכת ___).\n4. קחו את האות האחרונה של שם החג שלנו.\n\nחברו את האותיות לפי הסדר למילה אחת. מה קיבלתם?",answers:["מפתח","המפתח"],placeholder:"הכנס מילה..."},
{id:2,title:"חשבון של מכות",description:"קחו את מספר המכות שקיבלו המצרים.\nחסרו ממנו את מספר האמהות.\nהכפילו את התוצאה במספר הכוסות שאנו שותים בליל הסדר.\n\nמה המספר שיצא?",answers:["24","עשרים וארבע"],placeholder:"הכנס מספר..."},
{id:3,title:"מחסום: חפש את המטמון",description:"במירוץ למיליון, ה'מחסום' היא משימה פיזית שלוקחת זמן. בחרו נציג אחד מהקבוצה.\nעליו לרוץ ברחבי הבית ולהביא אל השולחן 3 חפצים אמיתיים שמתחילים באותיות המרכיבות את המילה 'פסח' (חפץ שמתחיל ב-פ', חפץ ב-ס', וחפץ ב-ח').\n\n*אסור להשתמש בחפצים שכבר נמצאים על שולחן הסדר!*\n\nכשהנציג חוזר עם שלושת החפצים וכולם מסכימים שהם מתאימים, הקלידו את המילה 'הבאנו' כדי להמשיך.",answers:["הבאנו","הבאתי","מצאנו","בוצע"],placeholder:"הקלידו הבאנו בסיום..."},
{id:4,title:"כתב סתרים מצרי",description:"במירוץ למיליון עליכם לפענח שפות זרות. כדי לחמוק משומרי הארמון, בני ישראל השתמשו ב'צופן אתב\"ש' (האות א' מוחלפת ב-ת', ב' מוחלפת ב-ש', ג' ב-ר', ד' ב-ק' וכן הלאה).\n\nלפי צופן זה, פענחו את המילה הבאה (מימין לשמאל) כדי לגלות מי שלט במצרים:\n\nו ג ז צ\n\nמי זה?",answers:["פרעה"],placeholder:"הכנס את שם השליט..."},
{id:5,title:"קוד מוזיקלי",description:"אחד השירים המוכרים בהגדה קודד לראשי תיבות. פענחו אותם כדי למצוא את שם השיר (3 מילים):\n\nו' ה' ש' ל' ו' ל'\nש' ל' א' ב' ע' ע' ל'\nא' ל' ע' ו' ע' ל'\n\nמהו השיר?",answers:["והיא שעמדה","והיא שעמדה לאבותינו","והיא שעמדה לאבותינו ולנו"],placeholder:"הכנס את מילות השיר..."},
{id:6,title:"הנדסה של מצה",description:"חידה בגיאומטריה:\nלקחתם מצה ריבועית שלמה וחציתם אותה באלכסון (מפינה לפינה).\nלאחר מכן, חציתם גם את האלכסון השני, כך שהמצה חולקה ל-4 משולשים שווים.\n\nאם תספרו את כל הצלעות של כל 4 המשולשים יחד (כל משולש נספר בנפרד), איזה מספר תקבלו סך הכל?",answers:["12","שתים עשרה","שתיים עשרה"],placeholder:"הכנס מספר..."},
{id:7,title:"ניווט: מפת הפפירוס של פרעה",description:"ברחתם מהארמון! בידיכם מפת פפירוס עתיקה מפרעה, ועליה מסלול הבריחה. עליכם לזהות את 3 התחנות במפה לפי התיאור, ולקחת את האות הראשונה מכל תחנה (תחנה 1, ואז 2, ואז 3):\n\n📍 תחנה 1: עיר המסכנות הראשונה שבנינו במצרים (לא רעמסס, העיר השנייה).\n📍 תחנה 2: התחנה הראשונה אליה הגענו ביציאה, שעל שמה אחד משלושת הרגלים!\n📍 תחנה 3: שם נוסף להר סיני.\n\nחברו את שלוש האותיות הראשונות של התחנות (לפי הסדר). איזו מילה קיבלתם?",answers:["פסח"],placeholder:"הכנס מילה של 3 אותיות..."},
{id:8,title:"שלבים בסדר",description:"כדי למצוא את ההתקדמות, עליכם לנווט נכון בסימני הסדר (קדש, ורחץ, כרפס, יחץ...).\n\nהתחילו בתחנה הראשונה (\"קדש\").\nהתקדמו בדיוק 4 תחנות קדימה.\n\nבאיזה שלב של הסדר אתם נמצאים כעת?",answers:["מגיד","המגיד"],placeholder:"הכנס את שם השלב..."},
{id:9,title:"ניווט בהגדה",description:"קחו את ההגדה שלפניכם ופתחו אותה.\nחפשו את הקטע המפורסם שמתחיל במילים: 'בכל דור ודור חייב אדם לראות את עצמו כאילו הוא יצא ממצרים...'\nקראו את הקטע עד סופו. מהי המילה האחרונה שמסיימת את הקטע הזה, ממש לפני שמתחילים לשיר את ההלל ('לפיכך אנחנו חייבים להודות...')?",answers:["הללויה","הללו-יה","הללו יה","הללויה!"],placeholder:"הכנס את המילה האחרונה..."},
{id:10,title:"בלש השירים - התמונה המסתורית",type:"manual",description:"לפניכם קישור לתמונה מיוחדת (התמונה תפתח בחלון חדש).\n\nבתמונה הזו מסתתרים איורים המרמזים על לא פחות מ-10 שירים ופיוטים שונים הקשורים לפסח וליציאת מצרים!\n\nמה עליכם לעשות?\nמצאו את כל ה-10, רשמו אותם על דף, והראו למנהל המשחק את הרשימה המלאה. רק אם מצאתם הכל, תקבלו ממנו אישור מעבר לתחנה הבאה.",clues:[{type:'link',url:'https://drive.google.com/file/d/1VaN9YcryrAinUxm9xhLCJHHw_6jnPS4M/view?usp=drivesdk',text:'לחצו כאן לפתיחת התמונה המסתורית'}],footerText:"חפשו היטב בכל פינה בתמונה!",buttonText:"הראינו למנהל את כל ה-10!"},
{id:11,title:"משימת פרצוף מרור",type:"manual",description:"משימת צילום משפחתית קורעת!\n\nכולנו אוכלים מרור בליל הסדר ודומעים קצת. עליכם להצטלם יחד (כל חברי הקבוצה) עושים את הפרצוף הכי חמוץ, סובל ומר שלכם – כאילו אכלתם עכשיו כף שלמה של חזרת חריפה במיוחד!\n\nמה צריך לעשות:\nהראו את התמונה המצחיקה שצילמתם למנהל המשחק כדי לקבל אישור מעבר לתחנה האחרונה.",footerText:"הכינו את הפרצופים!",buttonText:"הראינו למנהל (אישור מעבר)"},
{id:12,title:"קוד הכספת",description:"הגעתם לכספת האחרונה במירוץ! הרכיבו את קוד 4 הספרות מהנתונים הבאים (משמאל לימין):\n\n1. מספר המצות המכוסות על השולחן (בראש הסדר)\n2. מספר האחים (הבנים) עליהם דיברה תורה\n3. הכמות הכוללת של כוסות היין שאנו שותים\n4. מספר הפריטים שנהוג לשים על קערת הפסח",clues:[{type:'text_big',content:'_ _ _ _'}],answers:["3446","3 4 4 6"],placeholder:"הכנס 4 ספרות..."}
];

// ========== Storage ==========
function loadTeams(){try{return JSON.parse(localStorage.getItem('pesach-teams'))||[]}catch{return[]}}
function saveTeams(t){try{localStorage.setItem('pesach-teams',JSON.stringify(t))}catch{}}

// ========== State ==========
let state={view:'home',teams:loadTeams(),selectedTeam:null,taskIdx:0,elapsed:0,penalty:0,timerOn:false,newName:'',pwd:'',loginErr:false,input:'',feedback:null};
let timerInterval=null;

function setState(patch){
  Object.assign(state,typeof patch==='function'?patch(state):patch);
  render();
}

function startTimer(){
  stopTimer();
  state.timerOn=true;
  timerInterval=setInterval(()=>{state.elapsed++;render()},1000);
}
function stopTimer(){state.timerOn=false;clearInterval(timerInterval)}

function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ========== Icons (inline SVG) ==========
const icons={
  clock:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  home:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  arrow:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>',
  check:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  warn:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
  settings:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  plus:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>',
  trash:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  ext:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>',
  pin:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>'
};

function dots(){
  let h='<div style="display:flex;gap:8px;justify-content:center;margin:16px 0" dir="ltr">';
  for(let i=0;i<TASKS.length;i++){
    const w=i<state.taskIdx?'10px':i===state.taskIdx?'28px':'10px';
    const bg=i<state.taskIdx?'#f59e0b':i===state.taskIdx?'#d97706':'rgba(252,211,77,0.4)';
    h+=`<div class="progress-dot" style="width:${w};background:${bg}"></div>`;
  }
  return h+'</div>';
}

function nl2br(s){return esc(s).replace(/\n/g,'<br>')}

// ========== Render ==========
function render(){
  const s=state;
  const total=s.elapsed+s.penalty;
  const app=document.getElementById('app');

  if(s.view==='home'){
    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center p-5 relative overflow-hidden">
      <div class="card rounded-[2.5rem] p-10 text-center space-y-7 max-w-md w-full relative z-10 fade-in">
        <div>
          <div style="font-size:5rem;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(180,120,30,0.25))">🫓🍷</div>
          <h1 class="ff" style="font-size:2.8rem;font-weight:900;color:#92400e;line-height:1.15">המירוץ לפסח</h1>
          <p class="ff" style="color:rgba(180,100,20,0.7);font-size:1.1rem;margin-top:12px;font-weight:700">מהדורת חדר בריחה אקסטרים!</p>
        </div>
        <button onclick="setState({view:'intro'})" class="btn-gold ff" style="width:100%;font-size:1.5rem;font-weight:800;padding:1.4rem;border-radius:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px">
          <span style="font-size:2rem">🏃‍♂️</span> כניסת שחקנים
        </button>
        <button onclick="setState({view:'admin_login'})" class="btn-dark ff" style="width:100%;font-size:1.1rem;font-weight:700;padding:1.2rem;border-radius:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
          ${icons.settings} מנהל אחראי
        </button>
        <div style="padding-top:20px;border-top:2px solid rgba(252,211,77,0.4)">
          <p style="font-size:11px;font-weight:700;color:rgba(180,100,20,0.4)">קרדיט: יצרה בעזרת בינה מלאכותית – מורן קמיל גלברג, הוראה מותאמת</p>
        </div>
      </div>
    </div>`;
    return;
  }

  if(s.view==='admin_login'){
    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center p-5">
      <div class="card rounded-[2.5rem] p-10 text-center max-w-md w-full relative fade-in">
        <button onclick="setState({view:'home',loginErr:false,pwd:''})" style="position:absolute;top:20px;right:20px;padding:8px;color:#d97706;background:none;border:none;cursor:pointer;border-radius:50%">${icons.home}</button>
        <div style="font-size:4.5rem;margin-bottom:20px">🗝️</div>
        <h2 class="ff" style="font-size:1.8rem;font-weight:900;color:#92400e;margin-bottom:2rem">כניסת מנהל</h2>
        <input id="pwd-input" type="password" class="input-field" style="text-align:center;font-size:1.5rem;letter-spacing:0.2em;margin-bottom:8px" placeholder="הכנס סיסמה..." value="${esc(s.pwd)}" oninput="state.pwd=this.value;state.loginErr=false" onkeydown="if(event.key==='Enter')loginAdmin()">
        ${s.loginErr?'<p style="color:#dc2626;font-weight:700;font-size:1.1rem;margin:12px 0">סיסמה שגויה, נסה שוב</p>':''}
        <button onclick="loginAdmin()" class="btn-gold ff" style="width:100%;margin-top:16px;font-size:1.2rem;font-weight:900;padding:1rem;border-radius:1rem;border:none;cursor:pointer">היכנס</button>
      </div>
    </div>`;
    document.getElementById('pwd-input')?.focus();
    return;
  }

  if(s.view==='admin'){
    let answersHTML=TASKS.map((t,i)=>`
      <div style="padding:16px;background:#fffbeb;border-radius:12px;border:1px solid #fde68a;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px">
        <span style="font-weight:700;color:#78350f">${i+1}. ${esc(t.title)}</span>
        <span style="font-size:13px;font-weight:700;background:#fde68a;color:#92400e;padding:6px 14px;border-radius:8px;white-space:nowrap">${t.type==='manual'?'משימה ידנית':esc(t.answers[0])}</span>
      </div>`).join('');
    let teamsHTML=s.teams.length===0?'<p style="color:rgba(180,100,20,0.4);text-align:center;padding:40px 0;font-size:1.1rem">אין עדיין קבוצות במערכת.</p>':
      s.teams.map(t=>{
        const stLabel=t.status==='waiting'?'ממתינים':t.status==='playing'?'משחקים':'סיימו!';
        const stColor=t.status==='waiting'?'background:#fde68a;color:#92400e':t.status==='playing'?'background:#dbeafe;color:#1d4ed8':'background:#dcfce7;color:#166534';
        return`<div class="card" style="border-radius:1rem;padding:20px;display:flex;align-items:center;justify-content:space-between">
          <div>
            <h3 style="font-size:1.2rem;font-weight:700;color:#78350f">${esc(t.name)}</h3>
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <span style="font-size:11px;font-weight:700;padding:6px 12px;border-radius:99px;${stColor}">${stLabel}</span>
              ${t.status==='finished'?`<span style="font-size:13px;font-family:monospace;font-weight:700;color:#92400e;background:#fef3c7;padding:4px 12px;border-radius:8px;display:flex;align-items:center;gap:4px">${icons.clock} ${fmt(t.totalTime)}</span>`:''}
            </div>
          </div>
          <button onclick="deleteTeam('${t.id}')" style="color:#f87171;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px">${icons.trash}</button>
        </div>`}).join('');

    app.innerHTML=`
    <div class="min-h-screen p-4 sm:p-6">
      <div style="max-width:42rem;margin:0 auto;display:flex;flex-direction:column;gap:24px">
        <div class="card" style="border-radius:1rem;padding:24px;display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:12px;color:#92400e">${icons.settings}<h1 class="ff" style="font-size:1.8rem;font-weight:900;color:#92400e">פאנל ניהול</h1></div>
          <button onclick="setState({view:'home'})" style="padding:8px;color:#d97706;background:none;border:none;cursor:pointer;border-radius:50%">${icons.home}</button>
        </div>
        <div class="card" style="border-radius:1rem;padding:24px">
          <h2 class="ff" style="font-size:1.2rem;font-weight:700;color:#92400e;margin-bottom:16px">הוספת קבוצה חדשה</h2>
          <div style="display:flex;gap:12px">
            <input id="team-input" class="input-field" style="flex:1" placeholder="שם המשפחה / קבוצה..." value="${esc(s.newName)}" oninput="state.newName=this.value" onkeydown="if(event.key==='Enter')addTeam()">
            <button onclick="addTeam()" class="btn-gold ff" style="padding:0 24px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:8px;white-space:nowrap">${icons.plus} הוסף</button>
          </div>
        </div>
        <div class="card" style="border-radius:1rem;padding:24px">
          <h2 class="ff" style="font-size:1.4rem;font-weight:900;color:#92400e;margin-bottom:20px">תשובות לחידות</h2>
          <div style="display:flex;flex-direction:column;gap:12px">${answersHTML}</div>
        </div>
        <h2 class="ff" style="font-size:1.4rem;font-weight:900;color:#92400e;padding:0 4px">מצב הקבוצות (${s.teams.length})</h2>
        <div style="display:flex;flex-direction:column;gap:16px">${teamsHTML}</div>
      </div>
    </div>`;
    return;
  }

  if(s.view==='intro'){
    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center p-5 relative">
      <div class="card rounded-[2.5rem] overflow-hidden max-w-md w-full relative z-10 fade-in">
        <button onclick="setState({view:'home'})" style="position:absolute;top:20px;right:20px;z-index:20;padding:8px;color:rgba(120,53,15,0.5);background:rgba(255,255,255,0.5);border:none;cursor:pointer;border-radius:50%">${icons.home}</button>
        <div style="background:linear-gradient(to left,#fbbf24,#fcd34d);padding:3rem 2.5rem 2.5rem;text-align:center">
          <div style="font-size:4.5rem;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.12))">🐪🏜️</div>
          <h1 class="ff" style="font-size:2.2rem;font-weight:900;color:#78350f">המירוץ לפסח</h1>
        </div>
        <div style="padding:2rem">
          <h2 class="ff" style="font-size:1.4rem;font-weight:700;color:#92400e;margin-bottom:20px;text-align:center">נשלחתם חזרה בזמן!</h2>
          <p style="color:rgba(120,53,15,0.65);font-weight:500;margin-bottom:28px;text-align:center;line-height:1.7;font-size:1.1rem">רגע לפני תחילת יציאת מצרים, שומרי פרעה בעקבותיכם! הדרך היחידה שלכם לחזור להווה ולשולחן החג היא לפענח את סודות ההגדה, לפתור את חידות העבר, ולמצוא את קוד הכספת.</p>
          <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:32px">
            <div style="display:flex;align-items:flex-start;gap:16px;background:#fffbeb;padding:16px;border-radius:12px;border:1px solid #fde68a;color:rgba(120,53,15,0.7);font-weight:500">
              <span style="color:#d97706;flex-shrink:0;margin-top:2px">${icons.pin}</span><span>לפניכם ${TASKS.length} חידות, משימות מחסום וצפנים.</span>
            </div>
            <div style="display:flex;align-items:flex-start;gap:16px;background:#fffbeb;padding:16px;border-radius:12px;border:1px solid #fde68a;color:rgba(120,53,15,0.7);font-weight:500">
              <span style="color:#d97706;flex-shrink:0;margin-top:2px">${icons.clock}</span><span>הזמן נמדד! השעון מתחיל לרוץ ברגע שתבחרו קבוצה.</span>
            </div>
            <div style="display:flex;align-items:flex-start;gap:16px;background:#fef2f2;padding:16px;border-radius:12px;border:1px solid #fecaca;color:#b91c1c;font-weight:700">
              <span style="color:#ef4444;flex-shrink:0;margin-top:2px">${icons.warn}</span><span>כל תשובה שגויה = +30 שניות עונשין!</span>
            </div>
          </div>
          <button onclick="setState({view:'team_select'})" class="btn-gold ff" style="width:100%;font-size:1.4rem;font-weight:900;padding:1.2rem;border-radius:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px">
            בואו נתחיל ${icons.arrow}
          </button>
        </div>
      </div>
    </div>`;
    return;
  }

  if(s.view==='team_select'){
    const btns=s.teams.length===0?
      '<p style="text-align:center;color:#92400e;background:#fef3c7;padding:20px;border-radius:12px;border:1px solid #fcd34d;font-size:1.1rem">המנהל עדיין לא פתח קבוצות. בקשו ממנו להוסיף אתכם!</p>':
      s.teams.map(t=>{
        const dis=t.status==='finished';
        return`<button onclick="${dis?'':(`startGame('${t.id}')`)+'"'} ${dis?'disabled':''} class="ff" style="width:100%;font-size:1.3rem;font-weight:700;padding:1.2rem 1.5rem;border-radius:1rem;display:flex;align-items:center;justify-content:space-between;cursor:${dis?'not-allowed':'pointer'};border:2px solid ${dis?'#e5e7eb':'#fbbf24'};background:${dis?'#f3f4f6':'#fffbeb'};color:${dis?'#9ca3af':'#92400e'};transition:all .2s"${dis?'':' onmouseover="this.style.background=\'#fef3c7\'" onmouseout="this.style.background=\'#fffbeb\'"'}>
          <span>${esc(t.name)}</span>${dis?icons.check:''}
        </button>`}).join('');

    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center p-5">
      <div class="card rounded-[2.5rem] p-9 max-w-md w-full relative fade-in">
        <button onclick="setState({view:'intro'})" style="position:absolute;top:20px;right:20px;padding:8px;color:#d97706;background:none;border:none;cursor:pointer;border-radius:50%">${icons.arrow}</button>
        <div style="text-align:center;margin-bottom:32px;margin-top:16px">
          <div style="font-size:4.5rem;margin-bottom:16px">👨‍👩‍👧‍👦</div>
          <h2 class="ff" style="font-size:2.2rem;font-weight:900;color:#92400e">מי אתם?</h2>
          <p style="color:rgba(180,100,20,0.5);margin-top:12px;font-size:1.1rem;font-weight:500">בחרו את הקבוצה שלכם כדי להתחיל את השעון</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;max-height:50vh;overflow-y:auto;padding-left:4px">${btns}</div>
      </div>
    </div>`;
    return;
  }

  if(s.view==='playing'){
    const task=TASKS[s.taskIdx];
    let cluesHTML='';
    if(task.clues){
      cluesHTML=task.clues.map(c=>{
        if(c.type==='text_big')return`<div style="background:#fffbeb;padding:28px;border-radius:12px;border:2px dashed #fbbf24;text-align:center" dir="ltr"><span style="font-size:2.5rem;font-family:monospace;font-weight:900;color:#92400e;letter-spacing:0.15em">${esc(c.content)}</span></div>`;
        if(c.type==='link')return`<a href="${c.url}" target="_blank" rel="noopener noreferrer" class="ff" style="display:block;width:100%;background:#fef3c7;border:2px solid #fbbf24;color:#92400e;font-weight:700;padding:20px;border-radius:12px;text-align:center;font-size:1.1rem;text-decoration:none;transition:all .2s" onmouseover="this.style.background='#fde68a'" onmouseout="this.style.background='#fef3c7'">${icons.ext} ${esc(c.text||'לחצו כאן לרמז')}</a>`;
        return '';
      }).join('');
      cluesHTML=`<div style="display:flex;flex-direction:column;gap:16px;margin-bottom:28px">${cluesHTML}</div>`;
    }

    let actionHTML;
    if(task.type==='manual'){
      actionHTML=`
        ${task.footerText?`<p class="ff" style="text-align:center;font-weight:900;color:#92400e;font-size:1.2rem;padding:20px;background:#fef3c7;border-radius:12px;border:2px solid #fcd34d;margin-bottom:20px">${esc(task.footerText)}</p>`:''}
        <button onclick="manualContinue()" ${s.feedback?.type==='success'?'disabled':''} class="btn-gold ff" style="width:100%;font-size:1.2rem;font-weight:900;padding:1.2rem;border-radius:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px">${esc(task.buttonText)} ${icons.arrow}</button>`;
    }else{
      actionHTML=`
        <input id="answer-input" class="input-field" placeholder="${esc(task.placeholder)}" value="${esc(s.input)}" oninput="state.input=this.value" onkeydown="if(event.key==='Enter')submitAnswer()" ${s.feedback?.type==='success'?'disabled':''}>
        <button onclick="submitAnswer()" ${(!s.input.trim()||s.feedback?.type==='success')?'disabled':''} class="btn-gold ff" style="width:100%;margin-top:16px;font-size:1.2rem;font-weight:900;padding:1.2rem;border-radius:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px">בדיקה ${icons.check}</button>`;
    }

    let feedbackHTML='';
    if(s.feedback){
      const ok=s.feedback.type==='success';
      feedbackHTML=`<div style="margin-top:20px;padding:20px;border-radius:12px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.1rem;background:${ok?'#f0fdf4':'#fef2f2'};color:${ok?'#15803d':'#b91c1c'};border:2px solid ${ok?'#86efac':'#fca5a5'}">${ok?icons.check:icons.warn} ${esc(s.feedback.message)}</div>`;
    }

    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center p-4 sm:p-5">
      <div style="max-width:28rem;width:100%;display:flex;flex-direction:column;gap:16px">
        <div class="card" style="border-radius:1rem;padding:20px;display:flex;justify-content:space-between;align-items:center">
          <div><span style="font-size:11px;color:rgba(180,100,20,0.5);font-weight:700">קבוצה</span><br><span style="font-weight:900;color:#78350f;font-size:1.1rem">${esc(s.selectedTeam?.name||'')}</span></div>
          <div style="text-align:left"><span style="font-size:11px;color:rgba(180,100,20,0.5);font-weight:700">זמן כולל</span><div style="display:flex;align-items:center;gap:8px;font-family:monospace;font-size:1.5rem;font-weight:900;color:#92400e">${icons.clock} ${fmt(total)}</div></div>
        </div>
        ${dots()}
        ${s.penalty>0?`<div style="background:#fef2f2;border:2px solid #fecaca;color:#b91c1c;padding:12px 20px;border-radius:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center"><span>עונשין מצטבר:</span><span>+ ${fmt(s.penalty)}</span></div>`:''}
        <div class="card fade-in" style="border-radius:2rem;overflow:hidden">
          <div style="background:linear-gradient(to left,#fbbf24,#fcd34d);padding:20px 24px;display:flex;justify-content:space-between;align-items:center">
            <h2 class="ff" style="font-size:1.2rem;font-weight:900;color:#78350f">${esc(task.title)}</h2>
            <span style="font-weight:700;background:rgba(255,255,255,0.4);color:#78350f;padding:6px 16px;border-radius:99px;font-size:13px">${s.taskIdx+1} / ${TASKS.length}</span>
          </div>
          <div style="padding:28px">
            <p style="font-size:1.1rem;color:rgba(120,53,15,0.7);font-weight:500;line-height:1.7;margin-bottom:24px;white-space:pre-wrap">${nl2br(task.description)}</p>
            ${cluesHTML}
            ${actionHTML}
            ${feedbackHTML}
          </div>
        </div>
      </div>
    </div>`;
    if(!task.type)document.getElementById('answer-input')?.focus();
    return;
  }

  if(s.view==='finished'){
    app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center p-5">
      <div class="card rounded-[2.5rem] p-10 text-center max-w-md w-full fade-in">
        <div style="font-size:7rem;margin-bottom:24px;filter:drop-shadow(0 4px 20px rgba(180,120,30,0.25))">🏆</div>
        <h1 class="ff" style="font-size:2.8rem;font-weight:900;color:#92400e;line-height:1.15">כל הכבוד!</h1>
        <h2 class="ff" style="font-size:1.4rem;font-weight:700;color:#d97706;margin-top:12px;margin-bottom:32px">${esc(s.selectedTeam?.name||'')} הגיעה לשטיח הסיום!</h2>
        <div style="background:#fffbeb;border-radius:1rem;padding:32px;margin-bottom:28px;border:2px solid #fde68a">
          <p style="color:rgba(180,100,20,0.5);font-weight:500;margin-bottom:12px">הזמן הסופי שלכם במירוץ:</p>
          <div style="font-size:4rem;font-weight:900;font-family:monospace;color:#92400e;margin-bottom:16px">${fmt(total)}</div>
          ${s.penalty>0?`<p style="font-size:13px;color:rgba(220,38,38,0.7)">*כולל ${fmt(s.penalty)} עונשין</p>`:`<p style="font-size:13px;color:#15803d;font-weight:700">*מושלם! ללא שגיאות וללא עונשין!</p>`}
        </div>
        <p style="color:#166534;background:#f0fdf4;padding:16px;border-radius:12px;border:1px solid #bbf7d0;font-weight:500">התוצאה שלכם נשמרה בהצלחה!</p>
        <button onclick="setState({view:'home'})" class="ff" style="margin-top:24px;color:#d97706;font-weight:700;font-size:1.1rem;background:none;border:none;cursor:pointer">חזרה למסך הראשי</button>
      </div>
    </div>`;
    return;
  }
}

// ========== Actions ==========
function loginAdmin(){
  if(state.pwd==='1357'){setState({view:'admin',loginErr:false,pwd:''})}
  else{setState({loginErr:true})}
}

function addTeam(){
  if(!state.newName.trim())return;
  const t={id:String(Date.now()),name:state.newName.trim(),status:'waiting',totalTime:0,penaltyTime:0,createdAt:Date.now()};
  state.teams.push(t);
  saveTeams(state.teams);
  setState({newName:''});
}

function deleteTeam(id){
  state.teams=state.teams.filter(t=>t.id!==id);
  saveTeams(state.teams);
  render();
}

function startGame(id){
  const team=state.teams.find(t=>t.id===id);
  if(!team||team.status==='finished')return;
  team.status='playing';
  saveTeams(state.teams);
  state.selectedTeam=team;state.taskIdx=0;state.elapsed=0;state.penalty=0;state.input='';state.feedback=null;
  state.view='playing';
  render();
  startTimer();
}

function submitAnswer(){
  if(!state.input.trim())return;
  const task=TASKS[state.taskIdx];
  const norm=state.input.trim().replace(/\s+/g,' ');
  if(task.answers.some(a=>a===norm)){
    state.feedback={type:'success',message:'תשובה נכונה! מתקדמים...'};
    stopTimer();render();
    setTimeout(advance,1500);
  }else{
    state.penalty+=30;
    state.feedback={type:'error',message:'טעות! התווספו 30 שניות לשעון.'};
    render();
    setTimeout(()=>{state.feedback=null;render()},3000);
  }
}

function manualContinue(){
  state.feedback={type:'success',message:'מתקדמים למשימה הבאה...'};
  stopTimer();render();
  setTimeout(advance,1500);
}

function advance(){
  state.input='';state.feedback=null;
  if(state.taskIdx<TASKS.length-1){
    state.taskIdx++;
    render();startTimer();
  }else{
    stopTimer();
    const team=state.teams.find(t=>t.id===state.selectedTeam?.id);
    if(team){team.status='finished';team.totalTime=state.elapsed+state.penalty;team.penaltyTime=state.penalty;saveTeams(state.teams)}
    state.view='finished';render();
  }
}

// Initial render
render();
</script>
</body>
</html>
